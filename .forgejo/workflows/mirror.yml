# Forgejo → GitHub mirror — FU-MCP-SERVER-GITHUB-MIRROR.
#
# One-way force-push of this Forgejo repo's `main` (+ tags) to the GitHub
# mirror `10CG/nexus-sdk-js`. Pattern mirrored from
# `10CG/nexus-claude-plugin` (US-037 Wave 3 TASK-024).
#
# Why a mirror: npm publish is cross-border and intentionally NOT run on
# Aether CI runners (per Aether `docs/guides/forgejo-ci-internal-mirror.md`
# design goal "CI 热路径不再有任何跨境请求"). The GitHub mirror exists so
# GitHub Actions can host the publish hot-path on its own infra.
#
# Direction is strictly one-way: never mirror GitHub → Forgejo. Forgejo is
# the canonical source; the mirror is a public read-only window plus the
# host for the publish workflow.
#
# Trigger:
#   - push to main → fast-path mirror
#   - tag push `v*` → mirror tag (this is what triggers publish.yml on GitHub)
#   - hourly cron → safety net for missed pushes
#   - workflow_dispatch → manual rerun
#
# Secret: `GH_PAT` (configured on this Forgejo repo, NOT `GITHUB_PAT` — the
# `GITHUB_*` prefix is reserved by Forgejo/Gitea Actions for system tokens,
# per [[feedback_forgejo_gh_pat_naming]]).

name: mirror-to-github

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    # Every 6h at :29 (00:29, 06:29, 12:29, 18:29 UTC). Lowered from hourly
    # after push-triggered runs proved reliable end-to-end (FU-MCP-SERVER-
    # GITHUB-MIRROR closure). Cron is purely a safety net for missed push
    # events; 6h matches the bound on "how stale a mirror is allowed to be
    # if both push paths fail". Tracked: FU-MIRROR-PLATFORM-NATIVE-PUSH —
    # full migration to Forgejo built-in Push Mirror eliminates this
    # workflow entirely.
    - cron: '29 */6 * * *'
  workflow_dispatch: {}

jobs:
  mirror:
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Verify GH_PAT is set
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error::GH_PAT secret is not configured on this repo. Set it at:"
            echo "::error::  https://forgejo.10cg.pub/10CG/nexus-sdk-js/settings/actions/secrets"
            echo "::error::Use name 'GH_PAT' (not GITHUB_PAT — reserved prefix)."
            exit 1
          fi
          echo "GH_PAT present (length=${#GH_PAT})"

      - name: Push to GitHub mirror
        # bash explicitly: pipefail / [[ ]] are bashisms, Forgejo defaults
        # to POSIX sh ([[feedback_forgejo_actions_shell_bash]]).
        shell: bash
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          git config user.email "ci-mirror@10cg.internal"
          git config user.name "10CG Forgejo Mirror Bot"

          git remote add github \
            "https://x-access-token:${GH_PAT}@github.com/10CG/nexus-sdk-js.git"

          # Push main using the remote-tracking ref (refs/remotes/origin/main)
          # rather than the local branch ref. When this workflow is triggered
          # by a tag push, actions/checkout@v4 produces a detached HEAD at the
          # tag and DOES NOT create a local `refs/heads/main` — so the more
          # natural `git push github main --force` would fail with
          # `src refspec main does not match any`. The remote-tracking ref is
          # always present after `fetch-depth: 0` regardless of trigger, so
          # this form works for both push-to-main and tag-push triggers.
          # (Without this, tag-triggered runs always fail and rely on the
          # hourly cron run to ship the tag — wasted runner time + noisy logs.)
          git push github refs/remotes/origin/main:refs/heads/main --force
          git push github --tags --force
