# @nexus/sdk npm 发布
# 触发: push tag v*
# 目标: Forgejo npm registry (局域网内网直连)

name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: docker
    container:
      image: node:20-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to Forgejo npm registry
        env:
          NPM_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: |
          echo "@nexus:registry=http://192.168.69.200:3000/api/packages/10CG/npm/" > ~/.npmrc
          echo "//192.168.69.200:3000/api/packages/10CG/npm/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
          npm publish --registry http://192.168.69.200:3000/api/packages/10CG/npm/
