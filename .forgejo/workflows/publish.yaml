# @nexus/sdk npm 发布
# 触发: push tag v*
# 目标: Forgejo npm registry (内部局域网)

name: Publish to npm

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY_URL: https://forgejo.10cg.pub/api/packages/10CG/npm/

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure npm registry
        run: |
          npm config set @nexus:registry ${{ env.REGISTRY_URL }}
          npm config set -- '//forgejo.10cg.pub/api/packages/10CG/npm/:_authToken' '${{ secrets.NPM_PUBLISH_TOKEN }}'

      - name: Publish
        run: npm publish
