# @nexus/sdk npm 发布
# 触发: push tag v*
# 目标: Forgejo npm registry (局域网内网直连)

name: Publish to npm

on:
  push:
    tags:
      - 'v*'

env:
  # 内网直连 Forgejo，绕过 CF Access
  REGISTRY_HOST: 192.168.69.200:3000
  REGISTRY_URL: http://192.168.69.200:3000/api/packages/10CG/npm/

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure npm registry
        run: |
          npm config set @nexus:registry ${{ env.REGISTRY_URL }}
          npm config set -- '//${{ env.REGISTRY_HOST }}/api/packages/10CG/npm/:_authToken' '${{ secrets.NPM_PUBLISH_TOKEN }}'
          echo "Registry configured:"
          npm config get @nexus:registry

      - name: Publish
        run: npm publish --registry ${{ env.REGISTRY_URL }}
